name: STRAT_czce_rm_ema_cross_signal_60m
description: CZCE.RM EMA快慢线交叉信号差值正负 + ADX趋势过滤 60m
version: '1.0'
category: trend_following
factors:
- factor_name: EMA_Cross
  params:
    fast_period: 10
    slow_period: 20
- factor_name: ADX
  params:
    period: 14
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: ema_cross > 0 and adx > 17
  short_condition: ema_cross < 0 and adx > 17
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.052
symbols:
- KQ.m@CZCE.RM
transaction_costs:
  slippage_per_unit: 1.0
  commission_per_lot_round_turn: 2.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 2.97
  take_profit:
    type: atr
    atr_multiplier: 4.12
tags:
- CZCE
- RM
- ema_cross_signal
- trend_following
- 60m
