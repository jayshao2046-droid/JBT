# ============================================================
# JBT 标准策略导入模板 v1.0
# 适用于: generic_formal_strategy_v1 / 真实回测 (TqBacktest)
#
# 参数分类说明（见文件末尾注释）:
#   [SYS]  = 系统级参数 — 由 JBT 系统内部处理，不传入 TqBacktest
#   [TQ]   = 回测级参数 — 直接推送给 TqBacktest 引擎
#   [BOTH] = 两侧都使用（系统读取后转换格式再推入 TqBacktest）
# ============================================================

# ──────────────────────────────────────────────────────────
# 一、基本信息
# ──────────────────────────────────────────────────────────
name: "p_trend_following_60m_v1"                  # [SYS] 策略唯一标识
description: "基于EMA交叉与ADX/ATR过滤的棕榈油60分钟趋势跟随策略，严格执行日内平仓"           # [SYS] 策略说明
version: "1.0"                             # [SYS] 版本号
category: "trend_following"                # [SYS] 策略分类

# ──────────────────────────────────────────────────────────
# 二、回测基础参数
# ──────────────────────────────────────────────────────────
symbols:                                   # [TQ] 交易品种
  - "DCE.p2505"                            # DCE=大商所，p=棕榈油，2505=主力合约月份（示例）
                                           # 注意：实际回测需根据当前日期更新为最新主力合约代码

timeframe_minutes: 60                       # [TQ] K线周期（分钟）

# ──────────────────────────────────────────────────────────
# 三、因子/指标配置
# ──────────────────────────────────────────────────────────
factors:                                   # [TQ] 因子列表
  - factor_name: "EMA_Cross"                    #   因子名称
    weight: 0.4                            # [SYS] 因子权重
    params:                                #   因子参数
      fast_period: 12
      slow_period: 26

  - factor_name: "ADX"
    weight: 0.3
    params:
      period: 14

  - factor_name: "ATR"                     # 建议始终包含 ATR——用于 market_filter 和止损计算
    weight: 0.3
    params:
      period: 14

# ──────────────────────────────────────────────────────────
# 四、市场过滤（可选，推荐启用）
# ──────────────────────────────────────────────────────────
market_filter:                             # [TQ] 进场前的前置过滤条件
  enabled: true
  conditions:
    - "atr > 0.003 * close"               # 波动率过滤（比入场条件 atr > 0.003*close 更宽松或一致，此处设为一致以匹配逻辑，若需更宽松可改为 0.002）
    - "adx > 20"                          # 趋势强度过滤（比入场条件 adx > 22 更低）

# ──────────────────────────────────────────────────────────
# 五、信号规则
# ──────────────────────────────────────────────────────────
signal:                                    # [TQ] 开仓信号逻辑
  long_condition: "ema_fast > ema_slow and adx > 22 and atr > 0.003 * close"
  short_condition: "ema_fast < ema_slow and adx > 22 and atr > 0.003 * close"
  confirm_bars: 1                          # [TQ] 信号确认 K 线数

# ──────────────────────────────────────────────────────────
# 六、仓位管理
# ──────────────────────────────────────────────────────────
position_fraction: 0.08                    # [TQ] 初始仓位比例
position_adjustment:                       # [TQ] 动态仓位调整方式
  method: "atr_scaling"                   #   atr_scaling = ATR 比例缩放
  base_position: 0.08
  atr_period: 14
  atr_multiplier: 1.0

# ──────────────────────────────────────────────────────────
# 七、交易成本（进入真实回测的必要字段）
# ──────────────────────────────────────────────────────────
transaction_costs:                         # [TQ] 必填
  slippage_per_unit: 1                    #   每手滑点（棕榈油最小变动价位为2元，通常设为1个跳动单位即2元，此处按标准1单位计）
  commission_per_lot_round_turn: 8        #   每手双边佣金（元，棕榈油约7-8元/手）

# ──────────────────────────────────────────────────────────
# 八、风控参数
# ──────────────────────────────────────────────────────────
risk:                                      # [SYS]+[TQ] 
  daily_loss_limit_yuan: 2000             # [SYS] 当日最大亏损额
  per_symbol_fuse_yuan: 160              # [SYS] 单品种熔断额
  max_drawdown_pct: 0.008                # [SYS] 最大回撤比例限制
  force_close_day: "14:55"              # [TQ] 日盘强制平仓时间
  force_close_night: "22:55"            # [TQ] 夜盘强制平仓时间
  no_overnight: true                     # [TQ] 是否禁止持仓过夜

# （可选）止损止盈规则 ────────────────────────────────────
stop_loss:                                 # [TQ] 止损配置
  atr_multiplier: 1.5                    #   止损距离 = ATR × 倍数
  type: "atr"                            #   类型: atr

take_profit:                               # [TQ] 止盈配置
  atr_multiplier: 2.5
  type: "atr"

# ──────────────────────────────────────────────────────────
# 九、标签（可选，用于筛选分类）
# ──────────────────────────────────────────────────────────
tags: ["v1", "trend", "60m", "DCE", "palm_oil", "intraday"]   # [SYS] 自由标签