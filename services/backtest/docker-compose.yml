# ────────────────────────────────────────────────
# JBT 回测端 Docker Compose
# 服务: backtest-api (8103) + backtest-dashboard (3001)
# restart: always — 看板必须常驻，断电重启自动恢复
# ────────────────────────────────────────────────

services:
  backtest-api:
    build:
      context: ../..          # JBT 仓库根目录（需访问 services/ + shared/）
      dockerfile: services/backtest/Dockerfile
    image: jbt-backtest-api:latest
    container_name: JBT-BACKTEST-8103
    restart: always
    ports:
      - "8103:8103"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - backtest-runtime:/runtime
    networks:
      - backtest-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8103/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  backtest-dashboard:
    build:
      context: "./backtest_web"      # 正确看板目录（已替换旧 V0 模板）
      dockerfile: Dockerfile
    image: jbt-backtest-dashboard:latest
    container_name: JBT-BACKTEST-3001
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://backtest-api:8103
    depends_on:
      backtest-api:
        condition: service_healthy
    networks:
      - backtest-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  backtest-runtime:
    driver: local

networks:
  backtest-net:
    driver: bridge
