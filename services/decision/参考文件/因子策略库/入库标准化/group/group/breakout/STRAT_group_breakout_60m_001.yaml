name: "FC-25_breakout_atr_bollinger_vwap_60m"
description: "布林带突破 + ATR 波动率过滤 + VWAP 确认突破有效性策略"
version: "1.0"
category: "breakout"

factors:
  - factor_name: "BollingerBands"
    weight: 0.45
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "ATR"
    weight: 0.30
    params:
      period: 14
  - factor_name: "VWAP"
    weight: 0.25
    params: {}

signal:
  long_threshold: 0.55
  short_threshold: -0.55
  ema_periods: 2
  confirm_bars: 1

timeframe_minutes: 60
position_fraction: 0.14

