# ===== 通知监控配置 =====
monitor:
  feishu:
    webhook_url: ""
    webhooks:
      alert: ""
      trade: ""
      news: ""
    retry_times: 3
    retry_interval_seconds: 1
    timeout_seconds: 10
    mock_mode: false

  email:
    smtp_host: ""
    smtp_port: 465
    username: ""
    password: ""
    from_addr: ""
    default_to_addrs: []
    use_ssl: true
    use_tls: false
    retry_times: 3
    retry_interval_seconds: 1
    timeout_seconds: 10
    mock_mode: false

# ===== 运行时端点 =====
endpoints:
  data_api_url: "${JBT_DATA_API_URL}"
  decision_api_url: "${JBT_DECISION_API_URL}"
  trading_host: "${JBT_TRADING_HOST}"
  dashboard_port: "${JBT_DASHBOARD_PORT}"
