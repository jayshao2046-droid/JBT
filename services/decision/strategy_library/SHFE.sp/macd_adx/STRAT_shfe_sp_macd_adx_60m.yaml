name: STRAT_shfe_sp_macd_adx_60m
description: SHFE.sp MACD + ADX 强趋势确认 60m
version: '1.0'
category: trend_following
factors:
- factor_name: MACD
  params:
    fast: 12
    slow: 26
    signal: 9
- factor_name: ADX
  params:
    period: 14
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: macd_hist > 0 and macd_line > 0 and adx > 20
  short_condition: macd_hist < 0 and macd_line < 0 and adx > 20
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.052
symbols:
- KQ.m@SHFE.sp
transaction_costs:
  slippage_per_unit: 1.0
  commission_per_lot_round_turn: 3.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 2.97
  take_profit:
    type: atr
    atr_multiplier: 4.82
  force_close_night: '22:55'
tags:
- SHFE
- sp
- macd_adx
- trend_following
- 60m
