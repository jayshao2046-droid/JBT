# ============================================================
# JBT 标准策略导入模板 v1.0
# 适用于: generic_formal_strategy_v1 / 真实回测 (TqBacktest)
#
# 参数分类说明（见文件末尾注释）:
#   [SYS]  = 系统级参数 — 由 JBT 系统内部处理，不传入 TqBacktest
#   [TQ]   = 回测级参数 — 直接推送给 TqBacktest 引擎
#   [BOTH] = 两侧都使用（系统读取后转换格式再推入 TqBacktest）
# ============================================================

# ──────────────────────────────────────────────────────────
# 一、基本信息
# ──────────────────────────────────────────────────────────
name: "FC-XXX_描述性名称"                  # [SYS] 策略唯一标识，建议格式: FC-编号_版本_品种_周期
description: "策略用途的简短说明"           # [SYS] 策略说明
version: "1.0"                             # [SYS] 版本号
category: "trend_following"                # [SYS] 策略分类: trend_following / mean_reversion / breakout / arbitrage / intraday_momentum / intraday_oscillation / intraday_reversal

# ──────────────────────────────────────────────────────────
# 二、回测基础参数
# ──────────────────────────────────────────────────────────
symbols:                                   # [TQ] 交易品种，必须带交易所前缀
  - "DCE.p2605"                            #   DCE=大商所 SHFE=上期所 CZCE=郑商所 CFFEX=中金所
                                           #   格式: 交易所英文代码.品种+合约月份

timeframe_minutes: 5                       # [TQ] K线周期（分钟）: 1/3/5/15/30/60/240/1440

# ──────────────────────────────────────────────────────────
# 三、因子/指标配置
# ──────────────────────────────────────────────────────────
# 可用因子（共 23 个）:
#   趋势类: SMA, EMA, MACD, ADX, DEMA, EMA_Cross, EMA_Slope, Ichimoku, ParabolicSAR, Supertrend
#   反转类: RSI, BollingerBands, KDJ, WilliamsR, CCI
#   突破类: DonchianBreakout
#   波动类: ATR, ATRTrailingStop, HistoricalVol
#   量价类: VolumeRatio, OBV, VWAP, MFI
#
# 每个因子的输出字段名（用于 signal 条件表达式）:
#   SMA           -> sma
#   EMA           -> ema
#   MACD          -> macd_line, macd_signal, macd_hist
#   RSI           -> rsi, rsi_slope
#   VolumeRatio   -> volume_ratio
#   ATR           -> atr
#   ADX           -> adx
#   BollingerBands-> bollinger_mid, bollinger_upper, bollinger_lower, bb_position
#   DonchianBreakout -> donchian_high, donchian_low, donchian_exit_high, donchian_exit_low
#   WilliamsR     -> williams_r
#   KDJ           -> kdj_k, kdj_d, kdj_j
#   CCI           -> cci
#   OBV           -> obv
#   VWAP          -> vwap
#   MFI           -> mfi
#   ATRTrailingStop -> atr_trail_stop, atr_trail_direction
#   HistoricalVol -> hist_vol
#   EMA_Cross     -> ema_cross, ema_fast, ema_slow
#   EMA_Slope     -> ema_slope
#   DEMA          -> dema
#   ParabolicSAR  -> psar, psar_direction
#   Supertrend    -> supertrend_stop, supertrend_direction
#   Ichimoku      -> tenkan_sen, kijun_sen, senkou_a, senkou_b, ichimoku_signal

factors:                                   # [TQ] 因子列表 (至少 1 个)
  - factor_name: "MACD"                    #   因子名称（区分大小写，见上方列表）
    weight: 0.4                            # [SYS] 因子权重（用于系统风控评分，0~1，全部因子权重之和建议为 1.0）
    params:                                #   因子参数
      fast: 12
      slow: 26
      signal: 9

  - factor_name: "RSI"
    weight: 0.3
    params:
      period: 14

  - factor_name: "ATR"                     # 建议始终包含 ATR——用于 market_filter 和止损计算
    weight: 0.3
    params:
      period: 14

# ──────────────────────────────────────────────────────────
# 四、市场过滤（可选，推荐启用）
# ──────────────────────────────────────────────────────────
market_filter:                             # [TQ] 进场前的前置过滤条件
  enabled: true
  conditions:
    - "atr > 0.005 * close"               # 波动率过滤（避免横盘）
    - "adx > 20"                          # 趋势强度过滤（若用趋势策略）

# ──────────────────────────────────────────────────────────
# 五、信号规则
# ──────────────────────────────────────────────────────────
signal:                                    # [TQ] 开仓信号逻辑
  long_condition: "macd_hist > 0 and rsi > 50 and rsi_slope > 0"
  short_condition: "macd_hist < 0 and rsi < 50 and rsi_slope < 0"
  confirm_bars: 1                          # [TQ] 信号确认 K 线数

# ──────────────────────────────────────────────────────────
# 六、仓位管理
# ──────────────────────────────────────────────────────────
position_fraction: 0.08                    # [TQ] 初始仓位比例（相对 initial_capital）
position_adjustment:                       # [TQ] 动态仓位调整方式
  method: "atr_scaling"                   #   atr_scaling = ATR 比例缩放
  base_position: 0.08
  atr_period: 14
  atr_multiplier: 1.0

# ──────────────────────────────────────────────────────────
# 七、交易成本（进入真实回测的必要字段）
# ──────────────────────────────────────────────────────────
transaction_costs:                         # [TQ] 必填，否则系统拒绝提交真实回测
  slippage_per_unit: 1                    #   每手滑点（最小变动价位数，如棕榈油 1 = 2 元）
  commission_per_lot_round_turn: 8        #   每手双边佣金（元）

# ──────────────────────────────────────────────────────────
# 八、风控参数
# ──────────────────────────────────────────────────────────
risk:                                      # [SYS]+[TQ] 见下方分类注释
  daily_loss_limit_yuan: 2000             # [SYS] 当日最大亏损额（元）—— 系统层面强平
  per_symbol_fuse_yuan: 160              # [SYS] 单品种熔断额（元）
  max_drawdown_pct: 0.008                # [SYS] 最大回撤比例限制
  force_close_day: "14:55"              # [TQ] 日盘强制平仓时间
  force_close_night: "22:55"            # [TQ] 夜盘强制平仓时间（无夜盘品种可删除）
  no_overnight: true                     # [TQ] 是否禁止持仓过夜

# （可选）止损止盈规则 ────────────────────────────────────
stop_loss:                                 # [TQ] 止损配置（可选）
  atr_multiplier: 1.5                    #   止损距离 = ATR × 倍数
  type: "atr"                            #   类型: atr / fixed_pct / fixed_yuan

take_profit:                               # [TQ] 止盈配置（可选）
  atr_multiplier: 2.5
  type: "atr"

# ──────────────────────────────────────────────────────────
# 九、标签（可选，用于筛选分类）
# ──────────────────────────────────────────────────────────
tags: ["v1", "trend", "5m", "DCE", "palm_oil"]   # [SYS] 自由标签


# ============================================================
# 参数分类快速参考
# ============================================================
#
# ┌─────────────────────────────────────────────────────────────┐
# │ [TQ] 推送给 TqBacktest 的参数                                │
# ├─────────────────────────────────────────────────────────────┤
# │ symbols           — 品种 + 合约                              │
# │ timeframe_minutes — K线周期                                   │
# │ factors           — 因子列表及参数                            │
# │ market_filter     — 进场过滤条件                              │
# │ signal            — 开仓信号逻辑                              │
# │ position_fraction — 初始仓位比                                │
# │ position_adjustment — 动态仓位调整                            │
# │ transaction_costs — 滑点 + 佣金（必填）                       │
# │ risk.force_close_day/night — 强平时间                        │
# │ risk.no_overnight  — 禁止过夜                                 │
# │ stop_loss         — 止损规则                                  │
# │ take_profit       — 止盈规则                                  │
# ├─────────────────────────────────────────────────────────────┤
# │ [SYS] 系统内部处理，不传入 TqBacktest                        │
# ├─────────────────────────────────────────────────────────────┤
# │ name / description / version / category / tags             │
# │ factors[].weight   — 系统风控评分权重                         │
# │ risk.daily_loss_limit_yuan  — 系统层日亏损熔断                │
# │ risk.per_symbol_fuse_yuan   — 系统层单品种熔断                │
# │ risk.max_drawdown_pct       — 系统层最大回撤限制              │
# └─────────────────────────────────────────────────────────────┘
