name: STRAT_i_oscillation_33m_004
description: "极简震荡策略：ADX < 20 + RSI超买超卖 + PSAR趋势确认"
version: "3.0"
category: "oscillation"

factors:
  - factor_name: "ADX"
    weight: 0.50
    params:
      period: 14
  - factor_name: "RSI"
    weight: 0.30
    params:
      period: 14
  - factor_name: "ParabolicSAR"
    weight: 0.20
    params:
      af_start: 0.02
      af_max: 0.2

market_filter:
  enabled: true
  condition: "adx < 20"

signal:
  long_condition: "rsi < 30 and psar_trend == 'up'"
  short_condition: "rsi > 70 and psar_trend == 'down'"
  confirm_bars: 1

timeframe_minutes: 60

position_fraction: 0.06
position_adjustment:
  method: "atr_scaling"
  base_position: 0.06
  atr_period: 14
  atr_multiplier: 1.5

symbols:
  - "DCE.i2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["v3", "blackmetal", "iron_ore", "oscillation", "60m"]