name: STRAT_oi_oscillation_33m_001
description: "菜油震荡区间：BollingerBands + RSI超买超卖(14) + KDJ确认(9,3,3)"
version: "1.0"
category: "oscillation"

factors:
  - factor_name: "BollingerBands"
    weight: 0.40
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "RSI"
    weight: 0.35
    params:
      period: 14
  - factor_name: "KDJ"
    weight: 0.25
    params:
      n: 9
      m1: 3
      m2: 3

signal:
  long_threshold: 0.65
  short_threshold: -0.65
  ema_periods: 3
  confirm_bars: 2

timeframe_minutes: 60

position_fraction: 0.06

symbols:
  - "CZCE.OI605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["oilseed", "rapeseed_oil", "oscillation", "bollinger_rsi_kdj", "60m"]