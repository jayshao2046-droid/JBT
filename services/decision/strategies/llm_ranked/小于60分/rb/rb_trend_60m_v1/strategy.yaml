category: trend_following
description: 螺纹钢60分钟趋势跟踪策略，使用EMA交叉、ADX趋势强度及ATR波动过滤
factors:
- factor_name: EMA_Cross
  params:
    fast: 6
    slow: 134
  weight: 0.35
- factor_name: ADX
  params:
    period: 15
  weight: 0.3
- factor_name: ATR
  params:
    period: 15
  weight: 0.35
market_filter:
  conditions:
  - adx > 20
  - atr > 0.0006 * close
  - atr < 0.03 * close
  enabled: true
name: FC-rb_trend_60m_v1
position_adjustment:
  atr_multiplier: 1.0
  atr_period: 14
  base_position: 0.0075
  method: atr_scaling
position_fraction: 0.08633256045879875
risk:
  daily_loss_limit_yuan: 2000
  force_close_day: '14:55'
  force_close_night: '22:55'
  max_drawdown_pct: 0.008
  no_overnight: true
  per_symbol_fuse_yuan: 160
signal:
  confirm_bars: 1
  long_condition: ema_cross > 0 and adx > 25 and close > ema_fast and (close - ema_fast)
    < atr
  short_condition: ema_cross < 0 and adx > 25 and close < ema_fast and (ema_fast -
    close) < atr
stop_loss:
  atr_multiplier: 4.396171804156242
  type: atr
symbols:
- SHFE.rb2505
tags:
- v1
- trend
- 60m
- SHFE
- rb
take_profit:
  atr_multiplier: 2.6579654849632717
  type: atr
timeframe_minutes: 60
transaction_costs:
  commission_per_lot_round_turn: 8
  slippage_per_unit: 1
version: '1.0'
