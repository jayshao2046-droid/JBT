services:
  sim-trading:
    build: ./services/sim-trading
    platform: linux/amd64
    container_name: JBT-SIM-TRADING-8101
    network_mode: host
    environment:
      JBT_SERVICE_NAME: sim-trading
      JBT_SERVICE_PORT: "8101"
      SERVICE_PORT: "8101"
      # SimNow CTP 前置地址（7x24 前置）
      SIMNOW_MD_FRONT: tcp://180.168.146.187:10131
      SIMNOW_TRADE_FRONT: tcp://180.168.146.187:10130
      SIMNOW_BROKER_ID: "9999"
      # 账户信息从 .env 注入：SIMNOW_USER_ID / SIMNOW_PASSWORD
    env_file:
      - path: .env
        required: false
    volumes:
      - ./services/sim-trading:/app
      - ./services/sim-trading/runtime:/runtime

  sim-trading-web:
    build: ./services/sim-trading/sim-trading_web
    container_name: JBT-SIM-TRADING-WEB-3002
    ports:
      - "3002:3002"
    environment:
      BACKEND_BASE_URL: http://host.docker.internal:8101
      NODE_ENV: production
    depends_on:
      - sim-trading

  live-trading:
    build: ./services/live-trading
    container_name: JBT-LIVE-TRADING-8102
    ports:
      - "8102:8102"
    environment:
      JBT_SERVICE_NAME: live-trading
      JBT_SERVICE_PORT: "8102"
    volumes:
      - ./services/live-trading:/app
      - ./services/live-trading/runtime:/runtime

  backtest:
    build: ./services/backtest
    container_name: JBT-BACKTEST-8103
    ports:
      - "8103:8103"
    environment:
      JBT_SERVICE_NAME: backtest
      JBT_SERVICE_PORT: "8103"
      TQSDK_STRATEGY_YAML_DIR: /runtime/strategies
      BACKTEST_RESULT_DIR: /runtime/results
      BACKTEST_STORAGE_PATH: /runtime/backtests
      BACKTEST_REPORT_PATH: /runtime/reports
      # 以下敏感变量须在 .env 中覆盖，不要写入此文件
      # TQSDK_AUTH_USERNAME:
      # TQSDK_AUTH_PASSWORD:
    volumes:
      - ./services/backtest:/app
      - ./services/backtest/runtime:/runtime
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8103/api/health')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  backtest-web:
    build: ./services/backtest/backtest_web
    container_name: JBT-BACKTEST-WEB-3001
    ports:
      - "3001:3001"
    environment:
      BACKEND_BASE_URL: http://backtest:8103
      NODE_ENV: production
    depends_on:
      backtest:
        condition: service_healthy

  decision:
    build: ./services/decision
    container_name: JBT-DECISION-8104
    ports:
      - "8104:8104"
    environment:
      JBT_SERVICE_NAME: decision
      JBT_SERVICE_PORT: "8104"
      BACKTEST_SERVICE_URL: http://backtest:8103
      DATA_SERVICE_URL: http://jbt-data:8105
      SIM_TRADING_SERVICE_URL: http://sim-trading:8101
    env_file:
      - path: services/decision/.env
        required: false
    volumes:
      - ./services/decision:/app
      - ./services/decision/runtime:/runtime
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8104/health')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  decision-web:
    build: ./services/decision/decision_web
    container_name: JBT-DECISION-WEB-3003
    ports:
      - "3003:3003"
    environment:
      BACKEND_BASE_URL: http://decision:8104
      NODE_ENV: production
    depends_on:
      decision:
        condition: service_healthy

  jbt-data:
    build: ./services/data
    container_name: JBT-DATA-8105
    ports:
      - "8105:8105"
    environment:
      JBT_SERVICE_NAME: jbt-data
      JBT_SERVICE_PORT: "8105"
      DATA_STORAGE_ROOT: /data
      JBT_DATA_LOG_DIR: /data/logs
      RESEARCHER_STORE_ROOT: /data/researcher
      TZ: Asia/Shanghai
    env_file:
      - path: services/data/.env
        required: false
    volumes:
      - ./services/data:/app
      - ./data:/data
      - ./services/data/configs:/app/services/data/configs:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8105/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  dashboard:
    build: ./services/dashboard
    container_name: JBT-DASHBOARD-8106
    ports:
      - "8106:8106"
    environment:
      JBT_SERVICE_NAME: dashboard
      JBT_SERVICE_PORT: "8106"
    volumes:
      - ./services/dashboard:/app
      - ./services/dashboard/runtime:/runtime

# volumes 部分已移除，jbt-data 现在使用 bind mount 直接挂载 ./data
