name: STRAT_y_trend_d1_001
description: "豆油日线终极固定策略V6：极高ADX门槛(32) + 务实止盈(2.0ATR)，专为固定止损系统设计"
version: "6.0"
category: "trend_following"
symbols:
  - "DCE.Y2609"
timeframe_minutes: 1440
factors:
  - factor_name: "MACD"
    weight: 0.50
    params:
      fast: 12
      slow: 26
      signal: 9
  - factor_name: "ADX"
    weight: 0.30
    params:
      period: 14
  - factor_name: "ATR"
    weight: 0.20
    params:
      period: 14
market_filter:
  enabled: true
  conditions:
    - "atr > 0.002 * close"
signal:
  long_condition: "macd_hist > 0 and adx > 32"
  short_condition: "macd_hist < 0 and adx > 32"
confirm_bars: 1
position_fraction: 0.04
transaction_costs:
  slippage_per_unit: 1
  commission_per_lot_round_turn: 6
risk:
  daily_loss_limit: 0.05
  max_drawdown: 0.12
  stop_loss:
    atr_multiplier: 1.2
    type: "atr"
  take_profit:
    atr_multiplier: 2.0
    type: "atr"
tags:
  - "v6"
  - "trend_both"
  - "daily"
  - "DCE"
  - "soybean_oil"
  - "final_fixed_tp_sl"