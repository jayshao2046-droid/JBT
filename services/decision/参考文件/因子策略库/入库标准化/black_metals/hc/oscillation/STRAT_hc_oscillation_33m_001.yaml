name: STRAT_hc_oscillation_33m_001
description: "热卷震荡区间：BollingerBands + RSI(14) + 支撑阻力位确认"
version: "1.0"
category: "oscillation"

factors:
  - factor_name: "BollingerBands"
    weight: 0.45
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "RSI"
    weight: 0.35
    params:
      period: 14
  - factor_name: "ParabolicSAR"
    weight: 0.20
    params:
      af_start: 0.02
      af_max: 0.2

signal:
  long_threshold: 0.60
  short_threshold: -0.60
  ema_periods: 3
  confirm_bars: 2

timeframe_minutes: 60

position_fraction: 0.06

symbols:
  - "SHFE.hc2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["blackmetal", "hot_rolled_coil", "oscillation", "bollinger_rsi_psar", "60m"]