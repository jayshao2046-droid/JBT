name: "FC-151_v2_ml_black_reversal_rb2605_60m"
description: "使用 ML 模型预测反转，L3 三审决策的螺纹钢反转策略"
version: "2.0"
category: "reversal"

advanced_ai_integration:
  enabled: true
  l2_model:
    enabled: true
    model_type: "xgboost"
    model_path: "/path/to/l2_models/black_reversal_rb_model.pkl"
    feature_names: ["cci", "williams_r", "volume_ratio", "atr", "rsi"]
    prediction_type: "probability"
    confidence_threshold: 0.65
  l3_risk_check:
    enabled: true
    quality_check:
      min_confidence: 0.65
      max_single_factor_dependency: 0.8
    portfolio_check:
      max_position_fraction: 0.05
      check_account_risk: true
    liquidity_check:
      enabled: true
      min_bid_ask_volume: 200

factors:
  - factor_name: "CCI"
    weight: 0.40
    params:
      period: 20
  - factor_name: "WilliamsR"
    weight: 0.35
    params:
      period: 14
  - factor_name: "VolumeRatio"
    weight: 0.25
    params:
      period: 20

signal:
  ai_long_threshold: 0.72
  ai_short_threshold: -0.72
  rule_filter_enabled: false
  ema_periods: 3
  confirm_bars: 2

timeframe_minutes: 60

position_fraction: 0.05

symbols:
  - "SHFE.rb2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 100
  max_drawdown_pct: 0.005
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["ml_enhanced", "blackmetal", "rebar", "reversal", "60m"]