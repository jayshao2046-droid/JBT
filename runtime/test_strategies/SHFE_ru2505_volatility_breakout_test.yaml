strategy:
  symbol: SHFE.ru2505
  timeframe: 120
  parameters:
    position_fraction: 0.1
    stop_loss_yuan: 1000
    atr_period: 20
    atr_multiplier_entry: 1.5
    atr_multiplier_move_stop: 1.5
    atr_multiplier_take_profit: 3.0
    hh5_period: 5
    ll5_period: 5
    max_drawdown_percent: 0.8
    margin_usage_percent: 15
    consecutive_loss_pause_days: 1
    max_position_per_day: 1
    time_to_exit_bars: 12
  signals:
    entry:
      long: "close > highest(high, 5) and close - open >= 1.5 * atr(20)"
      short: "close < lowest(low, 5) and open - close >= 1.5 * atr(20)"
    exit:
      long: "profit >= 3 * atr(20) or low <= entry_low or bars_in_position >= 12"
      short: "profit >= 3 * atr(20) or high >= entry_high or bars_in_position >= 12"