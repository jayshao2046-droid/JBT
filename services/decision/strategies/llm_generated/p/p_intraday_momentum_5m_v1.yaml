name: "p_intraday_momentum_5m_v1"
description: "基于5分钟级别捕捉棕榈油日内波动脉冲策略，结合ATR、RSI和VolumeRatio进行入场与出场判断"
version: "1.0"
category: "intraday_momentum"

symbols:
  - "DCE.p2605"

timeframe_minutes: 5

factors:
  - factor_name: "ATR"
    weight: 0.35
    params:
      period: 14
  - factor_name: "RSI"
    weight: 0.35
    params:
      period: 14
  - factor_name: "VolumeRatio"
    weight: 0.30
    params:
      period: 20

market_filter:
  enabled: true
  conditions:
    - "atr > 0.003 * close"
    - "rsi > 45 and rsi < 55"
    - "volume_ratio > 1.0"

signal:
  long_condition: "atr > 0.004 * close and rsi > 55 and volume_ratio > 1.3"
  short_condition: "atr > 0.004 * close and rsi < 45 and volume_ratio > 1.3"
  confirm_bars: 1

position_fraction: 0.08
position_adjustment:
  method: "atr_scaling"
  base_position: 0.08
  atr_period: 14
  atr_multiplier: 1.0

transaction_costs:
  slippage_per_unit: 1
  commission_per_lot_round_turn: 8

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 160
  max_drawdown_pct: 0.008
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

stop_loss:
  type: "atr"
  atr_multiplier: 1.5
  atr_period: 14

take_profit:
  type: "atr"
  atr_multiplier: 2.5
  atr_period: 14

tags: ["v1", "momentum", "5m", "DCE", "palm_oil"]