name: STRAT_czce_ap_oscillation_60m
description: CZCE.AP 震荡策略：KDJ超卖/超买转折 + RSI方向确认 60m
version: '1.0'
category: oscillator
factors:
- factor_name: KDJ
  params:
    k_period: 9
    d_period: 3
    j_smooth: 3
- factor_name: RSI
  params:
    period: 14
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: kdj_k < 30 and kdj_k > kdj_d and rsi < 45
  short_condition: kdj_k > 70 and kdj_k < kdj_d and rsi > 55
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.027
symbols:
- KQ.m@CZCE.AP
transaction_costs:
  slippage_per_unit: 1.0
  commission_per_lot_round_turn: 2.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 2.64
  take_profit:
    type: atr
    atr_multiplier: 3.85
tags:
- CZCE
- AP
- oscillation
- oscillator
- 60m
