name: "p_trend_following_15m_v1"
description: "基于15分钟级别的日内趋势跟随策略，使用MACD、ADX和ATR进行过滤与风控"
version: "1.0"
category: "trend_following"

symbols:
  - "DCE.p2605"

timeframe_minutes: 15

factors:
  - factor_name: "MACD"
    weight: 0.4
    params:
      fast: 12
      slow: 26
      signal: 9

  - factor_name: "ADX"
    weight: 0.3
    params:
      period: 14

  - factor_name: "ATR"
    weight: 0.3
    params:
      period: 14

market_filter:
  enabled: true
  conditions:
    - "atr > 0.003 * close"
    - "adx > 20"

signal:
  long_condition: "macd_hist > 0 and adx > 22 and atr > 0.003 * close"
  short_condition: "macd_hist < 0 and adx > 22 and atr > 0.003 * close"
  confirm_bars: 1

position_fraction: 0.08
position_adjustment:
  method: "atr_scaling"
  base_position: 0.08
  atr_period: 14
  atr_multiplier: 1.0

transaction_costs:
  slippage_per_unit: 1
  commission_per_lot_round_turn: 8

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 160
  max_drawdown_pct: 0.008
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

stop_loss:
  type: "atr"
  atr_multiplier: 1.5
  atr_period: 14

take_profit:
  type: "atr"
  atr_multiplier: 2.5
  atr_period: 14

tags: ["v1", "trend", "15m", "DCE", "palm_oil"]