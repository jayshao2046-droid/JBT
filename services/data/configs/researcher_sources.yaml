# 研究员采集源配置 — 预置 6 个源

sources:
  - source_id: eastmoney_futures
    name: 东方财富期货频道
    url_pattern: https://futures.eastmoney.com/news/
    mode: code
    parser: eastmoney_futures
    market: domestic
    schedule:
      - 盘前
      - 午间
      - 盘后
    enabled: true
    priority: 8
    timeout: 30

  - source_id: jin10
    name: 金十数据快讯
    url_pattern: https://www.jin10.com/
    mode: code
    parser: jin10
    market: both
    schedule:
      - 盘前
      - 午间
      - 盘后
      - 夜盘
    enabled: true
    priority: 9
    timeout: 30

  - source_id: sina_futures
    name: 新浪财经期货
    url_pattern: https://finance.sina.com.cn/futuremarket/
    mode: code
    parser: sina_futures
    market: domestic
    schedule:
      - 盘前
      - 午间
      - 盘后
    enabled: true
    priority: 7
    timeout: 30

  - source_id: shfe_notice
    name: 上期所公告
    url_pattern: https://www.shfe.com.cn/news/notice/
    mode: code
    parser: shfe_notice
    market: domestic
    schedule:
      - 盘前
    enabled: true
    priority: 6
    timeout: 30

  - source_id: dce_notice
    name: 大商所公告
    url_pattern: http://www.dce.com.cn/dalianshangpin/xwzx/tzgg/index.html
    mode: code
    parser: dce_notice
    market: domestic
    schedule:
      - 盘前
    enabled: true
    priority: 6
    timeout: 30

  - source_id: czce_notice
    name: 郑商所公告
    url_pattern: http://www.czce.com.cn/cn/jysgg/index.html
    mode: code
    parser: czce_notice
    market: domestic
    schedule:
      - 盘前
    enabled: true
    priority: 6
    timeout: 30

  # ── 国际采集源（7 个）──────────────────────────────────
  - source_id: cme_advisory
    name: CME Group 公告
    url_pattern: https://www.cmegroup.com/market-data/advisories.html
    mode: code
    parser: cme_advisory
    market: international
    schedule:
      - all
    enabled: true
    priority: 7
    timeout: 60

  - source_id: kitco_gold
    name: Kitco 贵金属新闻
    url_pattern: https://www.kitco.com/news/
    mode: code
    parser: kitco_gold
    market: international
    schedule:
      - all
    enabled: true
    priority: 7
    timeout: 30

  - source_id: oilprice_com
    name: OilPrice 能源资讯
    url_pattern: https://oilprice.com/Latest-Energy-News/World-News
    mode: code
    parser: oilprice_com
    market: international
    schedule:
      - all
    enabled: true
    priority: 7
    timeout: 30

  - source_id: mining_com
    name: Mining.com 矿业
    url_pattern: https://www.mining.com/news/
    mode: code
    parser: mining_com
    market: international
    schedule:
      - all
    enabled: true
    priority: 6
    timeout: 30

  - source_id: investing_commodities
    name: Investing.com 大宗商品
    url_pattern: https://www.investing.com/news/commodities-news
    mode: code
    parser: investing_commodities
    market: international
    schedule:
      - all
    enabled: true
    priority: 8
    timeout: 60

  - source_id: fed_releases
    name: 美联储公告
    url_pattern: https://www.federalreserve.gov/newsevents/pressreleases.htm
    mode: code
    parser: fed_releases
    market: international
    schedule:
      - all
    enabled: true
    priority: 6
    timeout: 30

  - source_id: reuters_commodities
    name: 路透社大宗商品
    url_pattern: https://www.reuters.com/markets/commodities/
    mode: code
    parser: reuters_commodities
    market: international
    schedule:
      - all
    enabled: true
    priority: 8
    timeout: 60
