name: STRAT_m_trend_33m_003
description: "极简趋势策略：ADX > 25 + EMA多头排列 + MACD金叉"
version: "3.0"
category: "trend_up"

factors:
  - factor_name: "ADX"
    weight: 0.50
    params:
      period: 14
  - factor_name: "EMA"
    weight: 0.30
    params:
      period: 30
  - factor_name: "MACD"
    weight: 0.20
    params:
      fast: 12
      slow: 26
      signal: 9

market_filter:
  enabled: true
  condition: "adx > 25"

signal:
  long_condition: "ema_slope > 0 and macd_hist > 0"
  short_condition: "ema_slope < 0 and macd_hist < 0"
  confirm_bars: 1

timeframe_minutes: 60

position_fraction: 0.08
position_adjustment:
  method: "atr_scaling"
  base_position: 0.08
  atr_period: 14
  atr_multiplier: 1.5

symbols:
  - "DCE.m2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 160
  max_drawdown_pct: 0.009
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["v3", "oilseed", "soybean_meal", "trend_up", "60m"]