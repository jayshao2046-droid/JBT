name: STRAT_p_reversal_5m_001
description: 5分钟极简反转策略：RSI超买超卖 + WR背离确认
version: '3.0'
category: intraday_reversal
factors:
- factor_name: RSI
  weight: 0.5
  params:
    period: 14
- factor_name: WilliamsR
  weight: 0.5
  params:
    period: 14
market_filter:
  enabled: true
  conditions:
  - atr > 0.003 * close
  - adx < 20
signal:
  long_condition: rsi < 20 and williams_r < -80
  short_condition: rsi > 80 and williams_r > -20
  confirm_bars: 2
  long_threshold: 0.62
  short_threshold: -0.62
  ema_periods: 2
timeframe_minutes: 5
position_fraction: 0.05
position_adjustment:
  method: atr_scaling
  base_position: 0.05
  atr_period: 14
  atr_multiplier: 1.0
symbols:
- DCE.p2605
risk:
  daily_loss_limit_yuan: 1500
  per_symbol_fuse_yuan: 100
  max_drawdown_pct: 0.005
  force_close_day: '14:55'
  force_close_night: '22:55'
  no_overnight: true
tags:
- v3
- intraday
- reversal
- 5m
- filtered
- palm_oil
- prod_ready
- oilseed
- task0120
