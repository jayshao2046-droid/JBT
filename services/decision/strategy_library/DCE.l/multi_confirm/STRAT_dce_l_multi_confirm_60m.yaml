name: STRAT_dce_l_multi_confirm_60m
description: DCE.l 多重确认趋势：MACD + RSI + ADX + EMA 四重过滤 60m
version: '1.0'
category: trend_following
factors:
- factor_name: MACD
  params:
    fast: 12
    slow: 26
    signal: 9
- factor_name: RSI
  params:
    period: 14
- factor_name: ADX
  params:
    period: 14
- factor_name: EMA
  params:
    period: 20
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: macd_hist > 0 and rsi > 50 and adx > 20 and close > ema
  short_condition: macd_hist < 0 and rsi < 50 and adx > 20 and close < ema
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.052
symbols:
- KQ.m@DCE.l
transaction_costs:
  slippage_per_unit: 1.0
  commission_per_lot_round_turn: 2.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 2.97
  take_profit:
    type: atr
    atr_multiplier: 4.12
  force_close_night: '22:55'
tags:
- DCE
- l
- multi_confirm
- trend_following
- 60m
