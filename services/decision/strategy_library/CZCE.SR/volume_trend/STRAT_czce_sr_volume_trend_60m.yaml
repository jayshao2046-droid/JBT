name: STRAT_czce_sr_volume_trend_60m
description: CZCE.SR 量价趋势：MACD + 均线 + 成交量放大确认 60m
version: '1.0'
category: trend_following
factors:
- factor_name: VolumeRatio
  params:
    period: 10
- factor_name: EMA
  params:
    period: 20
- factor_name: SMA
  params:
    period: 20
- factor_name: MACD
  params:
    fast: 12
    slow: 26
    signal: 9
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: macd_hist > 0 and ema > sma and volume_ratio > 1.0
  short_condition: macd_hist < 0 and ema < sma and volume_ratio > 1.0
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.08
symbols:
- KQ.m@CZCE.SR
transaction_costs:
  slippage_per_unit: 1.0
  commission_per_lot_round_turn: 2.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 2.2
  take_profit:
    type: atr
    atr_multiplier: 3.3
tags:
- CZCE
- SR
- volume_trend
- trend_following
- 60m
