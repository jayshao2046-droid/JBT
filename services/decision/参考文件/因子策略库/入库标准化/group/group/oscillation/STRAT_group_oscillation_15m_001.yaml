  - factor_name: "ADX"
    weight: 0.40
    params:
      period: 14
  - factor_name: "RSI"
    weight: 0.30
    params:
      period: 14
  - factor_name: "KDJ"
    weight: 0.30
    params:
      n: 9
      m1: 3
      m2: 3

