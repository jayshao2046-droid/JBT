category: trend_following
description: 基于60分钟K线的低频趋势跟踪策略。采用EMA快慢线判断方向，使用ADX确认趋势强度，使用ATR进行波动率过滤与风控。
factors:
- factor_name: EMA_Cross
  params:
    fast: 6
    slow: 106
  weight: 0.35
- factor_name: ADX
  params:
    period: 12
  weight: 0.25
- factor_name: ATR
  params:
    period: 12
  weight: 0.4
market_filter:
  conditions:
  - adx > 20
  - atr > 0.0005 * close and atr < 0.032 * close
  enabled: true
name: FC-cf_trend_60m_v1
position_adjustment:
  atr_multiplier: 1.0
  atr_period: 14
  base_position: 0.08
  method: atr_scaling
position_fraction: 0.10051935182356557
risk:
  daily_loss_limit_yuan: 2000
  force_close_day: '14:55'
  max_drawdown_pct: 0.008
  no_overnight: true
  per_symbol_fuse_yuan: 160
signal:
  confirm_bars: 1
  long_condition: ema_cross > 0 and adx > 23 and close > ema_slow
  short_condition: ema_cross < 0 and adx > 23 and close < ema_slow
stop_loss:
  atr_multiplier: 1.5863508609560624
  type: atr
symbols:
- CZCE.CF2505
tags:
- v1
- trend
- 60m
- CZCE
- cotton
take_profit:
  atr_multiplier: 2.832768476029244
  type: atr
timeframe_minutes: 60
transaction_costs:
  commission_per_lot_round_turn: 8
  slippage_per_unit: 1
version: '1.0'
