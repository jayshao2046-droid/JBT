name: "FC-47_black_oscillating_i2605_60m"
description: "黑色系震荡区间：BollingerBands + RSI + 支撑阻力位确认"
version: "1.0"
category: "oscillation"

factors:
  - factor_name: "BollingerBands"
    weight: 0.45
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "RSI"
    weight: 0.35
    params:
      period: 14
  - factor_name: "ParabolicSAR"
    weight: 0.20
    params:
      af_start: 0.02
      af_max: 0.2

signal:
  long_threshold: 0.60
  short_threshold: -0.60
  ema_periods: 3
  confirm_bars: 2

timeframe_minutes: 60

position_fraction: 0.06

symbols:
  - "SHFE.rb2605" # 螺纹钢
  - "SHFE.hc2605" # 热卷
  - "DCE.jm2605" # 焦煤
  - "DCE.j2605" # 焦炭
  - "DCE.i2605" # 铁矿石

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["blackmetal", "oscillation", "bollinger_rsi_psar", "60m"]