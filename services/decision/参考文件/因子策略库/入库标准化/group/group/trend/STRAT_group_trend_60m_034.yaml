name: "FC-22_trend_macd_supertrend_60m"
description: "基于 MACD 和 Supertrend 的双趋势跟踪策略"
version: "1.0"
category: "trend_mid"

factors:
  - factor_name: "MACD"
    weight: 0.55
    params:
      fast: 12
      slow: 26
      signal: 9
  - factor_name: "Supertrend"
    weight: 0.45
    params:
      period: 10
      multiplier: 3.0

