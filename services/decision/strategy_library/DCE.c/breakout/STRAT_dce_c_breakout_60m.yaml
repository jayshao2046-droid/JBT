name: STRAT_dce_c_breakout_60m
description: DCE.c 布林带放量突破：价格突破上下轨 + 成交量放大 + ADX趋势 60m
version: '1.0'
category: breakout
factors:
- factor_name: BollingerBands
  params:
    period: 20
    std_dev: 2
- factor_name: VolumeRatio
  params:
    period: 10
- factor_name: ADX
  params:
    period: 14
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: close > bollinger_upper and volume_ratio > 1.3 and adx > 20
  short_condition: close < bollinger_lower and volume_ratio > 1.3 and adx > 20
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.1
symbols:
- KQ.m@DCE.c
transaction_costs:
  slippage_per_unit: 1.0
  commission_per_lot_round_turn: 2.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 2.2
  take_profit:
    type: atr
    atr_multiplier: 4.4
  force_close_night: '22:55'
tags:
- DCE
- c
- breakout
- breakout
- 60m
