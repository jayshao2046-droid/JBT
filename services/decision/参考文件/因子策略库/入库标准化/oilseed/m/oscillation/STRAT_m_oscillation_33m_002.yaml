name: STRAT_m_oscillation_33m_002
description: "极简震荡策略：ADX < 20 + RSI超买超卖 + BB触底反弹"
version: "3.0"
category: "oscillation"

factors:
  - factor_name: "ADX"
    weight: 0.50
    params:
      period: 14
  - factor_name: "RSI"
    weight: 0.30
    params:
      period: 14
  - factor_name: "BollingerBands"
    weight: 0.20
    params:
      period: 20
      std_dev: 2.0

market_filter:
  enabled: true
  condition: "adx < 20"

signal:
  long_condition: "rsi < 30 and bb_position == 'lower_band'"
  short_condition: "rsi > 70 and bb_position == 'upper_band'"
  confirm_bars: 1

timeframe_minutes: 60

position_fraction: 0.06
position_adjustment:
  method: "atr_scaling"
  base_position: 0.06
  atr_period: 14
  atr_multiplier: 1.5

symbols:
  - "DCE.m2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["v3", "oilseed", "soybean_meal", "oscillation", "60m"]