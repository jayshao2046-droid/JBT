name: "FC-150_v2_ml_black_oscillating_rb2605_60m"
description: "使用 ML 模型预测震荡，L3 三审决策的螺纹钢震荡区间策略"
version: "2.0"
category: "oscillation"

advanced_ai_integration:
  enabled: true
  l2_model:
    enabled: true
    model_type: "xgboost"
    model_path: "/path/to/l2_models/black_oscillation_rb_model.pkl"
    feature_names: ["rsi", "psar", "bb_position", "atr", "volume_ratio"]
    prediction_type: "probability"
    confidence_threshold: 0.65
  l3_risk_check:
    enabled: true
    quality_check:
      min_confidence: 0.65
      max_single_factor_dependency: 0.8
    portfolio_check:
      max_position_fraction: 0.06
      check_account_risk: true
    liquidity_check:
      enabled: true
      min_bid_ask_volume: 200

factors:
  - factor_name: "BollingerBands"
    weight: 0.45
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "RSI"
    weight: 0.35
    params:
      period: 14
  - factor_name: "ParabolicSAR"
    weight: 0.20
    params:
      af_start: 0.02
      af_max: 0.2

signal:
  ai_long_threshold: 0.60
  ai_short_threshold: -0.60
  rule_filter_enabled: false
  ema_periods: 3
  confirm_bars: 2

timeframe_minutes: 60

position_fraction: 0.06

symbols:
  - "SHFE.rb2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["ml_enhanced", "blackmetal", "rebar", "oscillation", "60m"]