  - tqsdk:      "实时期货 tick/分钟 K 线；需 SimNow/实盘账号"
  - akshare:    "免费 A 股/期货/宏观/大宗商品；覆盖广"
  - baostock:   "免费 A 股历史数据；稳定无注册（本文件管理）"
  - efinance:   "免费东方财富数据；A 股/期货实时+历史（本文件管理）"
