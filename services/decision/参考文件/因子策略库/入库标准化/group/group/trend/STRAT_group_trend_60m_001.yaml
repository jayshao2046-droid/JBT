name: "FC-128_v2_ml_oil_trend_m2605_60m"
description: "使用 ML 模型预测趋势，L3 三审决策的豆粕趋势做多策略"
version: "2.0"
category: "trend_up"

advanced_ai_integration:
  enabled: true
  l2_model:
    enabled: true
    model_type: "xgboost"
    model_path: "/path/to/l2_models/oil_trend_up_m_model.pkl"
    feature_names: ["ema_slope", "macd_hist", "adx", "volume_ratio", "bb_position"]
    prediction_type: "probability"
    confidence_threshold: 0.65
  l3_risk_check:
    enabled: true
    quality_check:
      min_confidence: 0.65
      max_single_factor_dependency: 0.8
    portfolio_check:
      max_position_fraction: 0.08
      check_account_risk: true
    liquidity_check:
      enabled: true
      min_bid_ask_volume: 50

factors:
  - factor_name: "EMA"
    weight: 0.30
    params:
      period: 30
  - factor_name: "MACD"
    weight: 0.35
    params:
      fast: 12
      slow: 26
      signal: 9
  - factor_name: "ADX"
    weight: 0.20
    params:
      period: 14
  - factor_name: "VolumeRatio"
    weight: 0.15
    params:
      period: 20

signal:
  ai_long_threshold: 0.50
  ai_short_threshold: -0.50
  rule_filter_enabled: false
  ema_periods: 2
  confirm_bars: 1

timeframe_minutes: 60

position_fraction: 0.08

symbols:
  - "DCE.m2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 160
  max_drawdown_pct: 0.008
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["ml_enhanced", "oilseed", "soybean_meal", "trend_up", "60m"]