name: "FC-26_mixed_adx_rsi_ema_atr_60m"
description: "ADX 趋势强度 + RSI 超买超卖 + EMA 位置 + ATR 波动率自适应策略"
version: "1.0"
category: "mixed"

factors:
  - factor_name: "ADX"
    weight: 0.30
    params:
      period: 14
  - factor_name: "RSI"
    weight: 0.25
    params:
      period: 14
  - factor_name: "EMA"
    weight: 0.25
    params:
      period: 20
  - factor_name: "ATR"
    weight: 0.20
    params:
      period: 14

