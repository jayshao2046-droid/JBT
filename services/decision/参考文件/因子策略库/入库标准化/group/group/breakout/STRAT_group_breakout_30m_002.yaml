name: "FC-28_volatility_breakout_atr_bollinger_30m_with_60m_filter"
description: "60m ATR 过滤波动率环境，30m 布林带突破 + ATR 动态止损策略"
version: "1.0"
category: "breakout"

factors:
  - factor_name: "ATR"
    weight: 0.40
    params:
      period: 14
  - factor_name: "BollingerBands"
    weight: 0.35
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "HistoricalVol"
    weight: 0.25
    params:
      period: 20

signal:
  long_threshold: 0.50
  short_threshold: -0.50
  ema_periods: 2
  confirm_bars: 1

timeframe_minutes: 30
position_fraction: 0.10

symbols:
  - "KQ.m@SHFE.rb"
  - "KQ.m@SHFE.hc"
  - "KQ.m@DCE.i"
  - "KQ.m@DCE.j"
  - "KQ.m@DCE.jm"
  - "KQ.m@SHFE.cu"
  - "KQ.m@SHFE.al"
  - "KQ.m@SHFE.zn"
  - "KQ.m@SHFE.ni"
  - "KQ.m@SHFE.ss"
  - "KQ.m@SHFE.au"
  - "KQ.m@SHFE.ag"
  - "KQ.m@INE.sc"
  - "KQ.m@SHFE.fu"
  - "KQ.m@SHFE.bu"
  - "KQ.m@SHFE.ru"
  - "KQ.m@SHFE.sp"
  - "KQ.m@CZCE.ap"
  - "KQ.m@CZCE.cf"
  - "KQ.m@CZCE.sr"
  - "KQ.m@CZCE.ma"
  - "KQ.m@CZCE.ta"
  - "KQ.m@DCE.eg"
  - "KQ.m@DCE.pp"
  - "KQ.m@DCE.l"
  - "KQ.m@DCE.v"
  - "KQ.m@DCE.eb"
  - "KQ.m@DCE.pg"
  - "KQ.m@DCE.lh"
  - "KQ.m@DCE.p"
  - "KQ.m@DCE.y"
  - "KQ.m@DCE.a"
  - "KQ.m@DCE.c"
  - "KQ.m@DCE.cs"
  - "KQ.m@DCE.m"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 200
  max_drawdown_pct: 0.010
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["multiframe", "volatility", "breakout", "atr", "bollinger", "historical_vol", "30m", "universe35"]
