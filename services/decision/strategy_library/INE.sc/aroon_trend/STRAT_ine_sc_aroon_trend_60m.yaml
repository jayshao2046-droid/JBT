name: STRAT_ine_sc_aroon_trend_60m
description: INE.sc Aroon趋势方向：Aroon上线强势 + 振荡子方向 + ADX确认 60m
version: '1.0'
category: trend_following
factors:
- factor_name: Aroon
  params:
    period: 25
- factor_name: ADX
  params:
    period: 14
- factor_name: ATR
  params:
    period: 14
signal:
  long_condition: aroon_up > 70 and aroon_oscillator > 0 and adx > 17
  short_condition: aroon_up < 30 and aroon_oscillator < 0 and adx > 17
  confirm_bars: 1
timeframe_minutes: 60
position_fraction: 0.032
symbols:
- KQ.m@INE.sc
transaction_costs:
  slippage_per_unit: 0.1
  commission_per_lot_round_turn: 5.0
risk:
  force_close_day: '14:55'
  no_overnight: true
  stop_loss:
    type: atr
    atr_multiplier: 3.17
  take_profit:
    type: atr
    atr_multiplier: 4.62
  force_close_night: '22:55'
tags:
- INE
- sc
- aroon_trend
- trend_following
- 60m
