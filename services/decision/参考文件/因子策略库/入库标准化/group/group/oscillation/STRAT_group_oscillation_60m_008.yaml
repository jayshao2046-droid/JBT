name: "FC-130_v2_ml_oil_oscillating_m2605_60m"
description: "使用 ML 模型预测震荡，L3 三审决策的豆粕震荡区间策略"
version: "2.0"
category: "oscillation"

advanced_ai_integration:
  enabled: true
  l2_model:
    enabled: true
    model_type: "xgboost"
    model_path: "/path/to/l2_models/oil_oscillation_m_model.pkl"
    feature_names: ["rsi", "kdj_j", "bb_position", "atr", "volume_ratio"]
    prediction_type: "probability"
    confidence_threshold: 0.65
  l3_risk_check:
    enabled: true
    quality_check:
      min_confidence: 0.65
      max_single_factor_dependency: 0.8
    portfolio_check:
      max_position_fraction: 0.06
      check_account_risk: true
    liquidity_check:
      enabled: true
      min_bid_ask_volume: 50

factors:
  - factor_name: "BollingerBands"
    weight: 0.40
    params:
      period: 20
      std_dev: 2.0
  - factor_name: "RSI"
    weight: 0.35
    params:
      period: 14
  - factor_name: "KDJ"
    weight: 0.25
    params:
      n: 9
      m1: 3
      m2: 3

signal:
  ai_long_threshold: 0.65
  ai_short_threshold: -0.65
  rule_filter_enabled: false
  ema_periods: 3
  confirm_bars: 2

timeframe_minutes: 60

position_fraction: 0.06

symbols:
  - "DCE.m2605"

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 120
  max_drawdown_pct: 0.006
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["ml_enhanced", "oilseed", "soybean_meal", "oscillation", "60m"]