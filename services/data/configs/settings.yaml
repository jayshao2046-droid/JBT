data_sources:
  tushare:
    enabled: true
    token: ""
  tqsdk:
    enabled: true
    edition: "community"
    username: ""
    password: ""
  akshare:
    enabled: true
    key: ""

collection:
  retry_times: 3
  retry_interval_seconds: 2
  timeout_seconds: 15

storage:
  base_path: "/data"
  minute_path: "parquet/{symbol}/1min"
  daily_path: "parquet/{symbol}/daily"
  macro_path: "macro"
  news_path: "news"
  sentiment_path: "sentiment"
  logs_path: "logs"

tqsdk:
  enabled: true
  edition: "community"
  account_mode: "sim"
  target_products:
    # SHFE（上期所）10个
    - "rb"
    - "hc"
    - "cu"
    - "al"
    - "zn"
    - "au"
