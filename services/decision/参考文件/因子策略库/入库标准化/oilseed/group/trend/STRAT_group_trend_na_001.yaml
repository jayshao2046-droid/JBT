name: "FC-52_oil_bear_trend_y2605_60m"
description: "油脂油料组下降趋势：MA空头排列(15/30/60) + MACD死叉 + ADX > 25 + 量能确认"
version: "1.0"
category: "trend_mid"

factors:
  - factor_name: "EMA"
    weight: 0.30
    params:
      period: 30
  - factor_name: "MACD"
    weight: 0.35
    params:
      fast: 12
      slow: 26
      signal: 9
  - factor_name: "ADX"
    weight: 0.20
    params:
      period: 14
  - factor_name: "VolumeRatio"
    weight: 0.15
    params:
      period: 20

signal:
  long_threshold: -0.55   # 注意：空头信号为负值触发
  short_threshold: -0.55  # 实际交易时：若 composite_score < -0.55 → 做空
  ema_periods: 2
  confirm_bars: 1

timeframe_minutes: 60

position_fraction: 0.08

symbols:
  - "DCE.y2605"   # 豆油
  - "DCE.p2605"   # 棕榈油
  - "CZCE.OI605"  # 菜油
  - "DCE.m2605"   # 豆粕

risk:
  daily_loss_limit_yuan: 2000
  per_symbol_fuse_yuan: 160
  max_drawdown_pct: 0.008
  force_close_day: "14:55"
  force_close_night: "22:55"
  no_overnight: true

tags: ["oilseed", "bear_trend", "ma_macd_adx", "60m"]

 说明：该策略与 FC-40 对称，仅将 long_threshold 改为负向触发，并确保 MACD 死叉 + 价格 < MA10 + 斜率向下。